<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Scrapbook ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="stars"></div>

<section class="cover">

    <img src="images/cover.jpg" class="cover-photo">

    <h1>Our Scrapbook ❤️</h1>

    <h2>Arinjay ❤️ Suprina</h2>

    <p>
        20 June 2026
    </p>

    <p class="quote">
        "Every memory with you is a page I'll never stop reading."
    </p>

    <button id="startBtn">
        📖 Open Our Scrapbook
    </button>
    <button id="shareBtn" class="share-button">
        📱 Copy link for phone
    </button>
    <p class="share-note">Copy the URL and send it to your phone for a quick, polished share.</p>

</section>

<audio id="music" loop>
    <source src="music/our-song.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
<script src="../js/background-music.js"></script>
</body>
</html>
